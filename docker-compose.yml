version: '3.8'

services:
  # ==================== 基础设施 ====================
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agent_platform
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus-standalone:
    image: milvusdb/milvus:v2.4.4
    container_name: milvus
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ==================== 业务服务 (Java/SpringBoot) ====================
  business-service:
    build:
      context: ./business-service
      dockerfile: Dockerfile
    container_name: business-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/agent_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      AGENT_SERVICE_URL: http://agent-service:8000
      RAG_SERVICE_URL: http://rag-service:8001
      GPU_NODE_URL: http://gpu-node:8002
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== Agent 服务 (Python/LangGraph) ====================
  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: agent-service
    ports:
      - "8000:8000"
    environment:
      AGENT_SERVICE_PORT: 8000
      AGENT_LLM_MODEL: gpt-4
      AGENT_LLM_API_KEY: ${LLM_API_KEY:-mock_api_key}
      AGENT_LLM_API_BASE: ${LLM_API_BASE:-https://api.openai.com/v1}
      AGENT_BUSINESS_SERVICE_URL: http://business-service:8080/api/v1
      AGENT_RAG_SERVICE_URL: http://rag-service:8001/api/v1
      AGENT_REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      business-service:
        condition: service_started

  # ==================== RAG 服务 (Python) ====================
  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: rag-service
    ports:
      - "8001:8001"
    environment:
      RAG_SERVICE_PORT: 8001
      RAG_MILVUS_HOST: milvus-standalone
      RAG_MILVUS_PORT: 19530
      RAG_REDIS_URL: redis://redis:6379
      RAG_BUSINESS_SERVICE_URL: http://business-service:8080/api/v1
    depends_on:
      milvus-standalone:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== GPU 节点 (Python) ====================
  gpu-node:
    build:
      context: ./gpu-node
      dockerfile: Dockerfile
    container_name: gpu-node
    ports:
      - "8002:8002"
    environment:
      GPU_SERVICE_PORT: 8002
      GPU_BUSINESS_SERVICE_URL: http://business-service:8080/api/v1
      GPU_REDIS_URL: redis://redis:6379
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy

  # ==================== Nginx 网关 ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - business-service
      - agent-service
      - rag-service
      - gpu-node

volumes:
  mysql_data:
  redis_data:
  milvus_data:
  minio_data:
