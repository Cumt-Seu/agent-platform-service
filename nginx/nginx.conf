upstream business_service {
    server business-service:8080;
}

upstream agent_service {
    server agent-service:8000;
}

upstream rag_service {
    server rag-service:8001;
}

upstream gpu_node {
    server gpu-node:8002;
}

server {
    listen 80;
    server_name _;

    # ==================== SSE 通用配置 ====================
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ==================== 静态资源（前端） ====================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ==================== Agent 服务路由 (agent-service:8000) ====================

    # Agent 对话 SSE（流式）
    location = /api/v1/agent/chat {
        proxy_pass http://agent_service/api/v1/agent/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # DAG 执行状态查询（LangGraph 实时状态）
    location ~ ^/api/v1/agent/sessions/[^/]+/dag$ {
        proxy_pass http://agent_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Skill 调用执行
    location ~ ^/api/v1/skills/[^/]+/invoke$ {
        proxy_pass http://agent_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 发起评审（Agent 执行评审 Skill）
    location = /api/v1/review/submit {
        proxy_pass http://agent_service/api/v1/review/submit;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 发起排障（Agent 执行排障 Skill）
    location = /api/v1/diagnosis/analyze {
        proxy_pass http://agent_service/api/v1/diagnosis/analyze;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ==================== RAG 服务路由 (rag-service:8001) ====================

    # 知识库检索
    location ~ ^/api/v1/knowledge-bases/[^/]+/query$ {
        proxy_pass http://rag_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 文档重新解析
    location ~ ^/api/v1/knowledge-bases/[^/]+/documents/[^/]+/reparse$ {
        proxy_pass http://rag_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # GitLab 导入
    location ~ ^/api/v1/knowledge-bases/[^/]+/import/gitlab$ {
        proxy_pass http://rag_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Confluence 同步
    location ~ ^/api/v1/knowledge-bases/[^/]+/import/confluence$ {
        proxy_pass http://rag_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ==================== GPU 节点路由 (gpu-node:8002) ====================

    # 启动训练
    location ~ ^/api/v1/finetune/tasks/[^/]+/start$ {
        proxy_pass http://gpu_node;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 停止训练
    location ~ ^/api/v1/finetune/tasks/[^/]+/stop$ {
        proxy_pass http://gpu_node;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 训练日志 SSE
    location ~ ^/api/v1/finetune/tasks/[^/]+/logs$ {
        proxy_pass http://gpu_node;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # 导出 LoRA 权重
    location ~ ^/api/v1/finetune/tasks/[^/]+/export$ {
        proxy_pass http://gpu_node;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ==================== 业务服务路由 (business-service:8080) ====================
    # 兜底：所有其他 /api/ 请求路由到业务服务
    location /api/ {
        proxy_pass http://business_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
